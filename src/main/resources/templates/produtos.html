<!DOCTYPE html>

<html lang="pt-br"
xmlns:th="http://www.thymeleaf.org"
xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
layout:decorate="layouts/layout">

<head>
<title>Produtos</title>
<link rel="stylesheet" th:href="@{/css/produto.css}">
</head>

<body>

<div layout:fragment="content">

<main class="container my-5">

<div class="row">

<!-- FILTROS -->
<aside class="col-md-3">

<div class="filter-box">

<h5>Produtos</h5>

<small class="text-muted">
(<span th:text="${#lists.size(produtos)}"></span>)
</small>

<hr>

<h6>Categorias</h6>

<select id="filtroCategoria" class="form-select mb-3">

<option value="">Todas</option>
<option value="Suspensão">Suspensão</option>
<option value="Farol">Farol</option>
<option value="Pneus">Pneus</option>
<option value="Lubrificantes">Lubrificantes</option>

</select>

<h6>Preço</h6>

<div class="d-flex gap-2 mb-3">

<input type="number"
id="precoMin"
class="form-control"
placeholder="De"
step="0.01">

<input type="number"
id="precoMax"
class="form-control"
placeholder="Até"
step="0.01">

</div>

<button id="btnFiltrar"
class="btn btn-success w-100">
Aplicar
</button>

</div>

</aside>


<!-- LISTA DE PRODUTOS -->
<section class="col-md-9">

<h4 class="mb-4">Produtos</h4>

<div class="row" id="listaProdutos">

<div class="col-md-3 mb-4"
th:each="produto : ${produtos}">

<div class="card h-100 ">

<div class="produto-img-container">

    <img th:src="@{'/img/' + ${produto.imagem}}"
         th:alt="${produto.nome}"
         class="produto-img"
         onerror="this.src='/img/sem-imagem.png'">

</div>

<div class="card-body d-flex flex-column text-center">

<h6 th:text="${produto.nome}"></h6>

<small class="text-muted">

<span th:text="${produto.modelo}"></span>
•

<span th:text="${produto.ano}"></span>
•

<span th:text="${produto.lado}"></span>

</small>

<p class="fw-bold text-success mt-2">

R$
<span th:text="${#numbers.formatDecimal(produto.preco,1,2)}"></span>

</p>

<div class="mt-auto d-grid gap-2">

<button class="btn btn-warning fw-bold "

th:data-id="${produto.id}"
th:data-nome="${produto.nome}"
th:data-preco="${produto.preco}"
th:data-imagem="${produto.imagem}"

onclick="comprarProduto(this)">

Comprar

</button>

<a th:href="@{/detalhes(id=${produto.id})}"
   class="btn btn-outline-dark btn-sm">
Ver detalhes
</a>

</div>

</div>

</div>

</div>

</div>

</section>

</div>

</main>

<script>

document.getElementById("btnFiltrar").addEventListener("click", function(){

    let categoria = document.getElementById("filtroCategoria").value;
    let precoMin = document.getElementById("precoMin").value;
    let precoMax = document.getElementById("precoMax").value;

    let url = "/produtos?";

    if(categoria) url += "categorias=" + categoria + "&";
    if(precoMin) url += "precoMin=" + precoMin + "&";
    if(precoMax) url += "precoMax=" + precoMax;

    window.location.href = url;

});

</script>
<script th:src="@{/js/produtosFiltro.js}"></script>

</div>

</body>

</html>
